
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Planner Diário PRO</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); /* AZUL */
    min-height: 100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

main {
    background:white;
    padding:25px;
    border-radius:20px;
    width:450px;
    box-shadow:0 15px 40px rgba(0,0,0,0.3);
}

h1 {
    text-align:center;
    margin-bottom:15px;
    color:#203a43;
}

.data-hoje {
    text-align:center;
    margin-bottom:15px;
    color:#555;
    font-size:14px;
}

.input-area {
    display:flex;
    flex-direction:column;
    gap:10px;
}

input, select, button {
    padding:12px;
    border-radius:10px;
    border:1px solid #ccc;
}

button {
    background:#2193b0;
    color:white;
    border:none;
    cursor:pointer;
    font-weight:bold;
}

button:hover {
    background:#176d85;
}

ul {
    list-style:none;
    margin-top:20px;
}

li {
    padding:12px;
    margin-bottom:10px;
    border-radius:10px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:#f5f7fa;
    transition:0.2s;
}

li:hover {
    transform:scale(1.02);
}

/* PRIORIDADES */
.alta { border-left:6px solid #ff4d4d; }
.media { border-left:6px solid #ffb84d; }
.baixa { border-left:6px solid #4dff88; }

/* FINALIZADA */
.done {
    text-decoration: line-through;
    opacity:0.6;
}

/* INFO */
.info {
    font-size:12px;
    color:#666;
}

/* TAG */
.tag {
    font-size:12px;
    background:#e3f2fd;
    color:#0d47a1;
    padding:3px 6px;
    border-radius:5px;
    margin-left:5px;
}
</style>
</head>

<body>

<main>
<h1>Meu Dia 🧠🔥</h1>

<div class="data-hoje" id="dataHoje"></div>

<div class="input-area">
    <input type="text" id="tarefa" placeholder="O que você precisa fazer hoje?">

    <input type="date" id="data">

    <input type="time" id="hora">

    <select id="categoria">
        <option>Treino</option>
        <option>Estudo</option>
        <option>Trabalho</option>
        <option>Saúde</option>
        <option>Pessoal</option>
    </select>

    <select id="prioridade">
        <option value="alta">Alta</option>
        <option value="media">Média</option>
        <option value="baixa">Baixa</option>
    </select>

    <button onclick="addTask()">Adicionar</button>
</div>

<ul id="lista">

<li class="alta">
    <div>
        <strong>Treinar perna</strong>
        <div class="info">📅 Hoje | ⏰ 18:00 <span class="tag">Treino</span></div>
    </div>
    <input type="checkbox" onclick="toggleTask(this)">
</li>

<li class="media">
    <div>
        <strong>Estudar HTML</strong>
        <div class="info">📅 Hoje | ⏰ 20:00 <span class="tag">Estudo</span></div>
    </div>
    <input type="checkbox" onclick="toggleTask(this)">
</li>

</ul>

</main>

<script>
const hoje = new Date();
document.getElementById("dataHoje").innerText =
    "Hoje: " + hoje.toLocaleDateString("pt-BR");

function addTask() {
    const tarefa = document.getElementById("tarefa").value;
    const data = document.getElementById("data").value;
    const hora = document.getElementById("hora").value;
    const categoria = document.getElementById("categoria").value;
    const prioridade = document.getElementById("prioridade").value;

    if (tarefa === "") return;

    const li = document.createElement("li");
    li.classList.add(prioridade);

    li.innerHTML = `
        <div>
            <strong>${tarefa}</strong>
            <div class="info">
                📅 ${data || "Sem data"} | ⏰ ${hora || "Sem hora"}
                <span class="tag">${categoria}</span>
            </div>
        </div>
        <input type="checkbox" onclick="toggleTask(this)">
    `;

    document.getElementById("lista").appendChild(li);

    document.getElementById("tarefa").value = "";
    document.getElementById("data").value = "";
    document.getElementById("hora").value = "";
}

function toggleTask(checkbox) {
    checkbox.parentElement.classList.toggle("done");
}
</script>

</body>
</html>
